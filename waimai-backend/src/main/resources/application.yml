spring:
  application:
    name: waimai-backend

  # 数据源配置
  datasource:
    driver-class-name:
      com.mysql.cj.jdbc.Driver
      # characterEncoding 用 UTF-8（Java 标准名）；utf8mb4 会导致 JDK 报 Unsupported character encoding
    url: jdbc:mysql://localhost:3306/waimai?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    # 密码若为纯数字或含 :#@ 等符号，建议加引号，避免 YAML 把 041213 当数字（如八进制）解析
    password: "041213"

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

# 应用配置
app:
  jwt:
    secret: your-secret-key-change-in-production
    expiration: 86400000 # 24小时，单位：毫秒
  wechat:
    appid: your-wechat-appid
    secret: your-wechat-secret

# 日志配置
logging:
  level:
    com.school.waimai: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
